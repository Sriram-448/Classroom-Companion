<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Companion — Student Portal</title>
<style>
  :root {
    --bg:         #0f172a;
    --surface:    #1e293b;
    --surface2:   #334155;
    --border:     #475569;
    --text:       #f1f5f9;
    --text-muted: #94a3b8;
    --blue:       #3b82f6;
    --green:      #22c55e;
    --amber:      #f59e0b;
    --red:        #ef4444;
    --purple:     #a855f7;
    --radius:     8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px; position: sticky; top: 0; z-index: 10;
  }
  .header-logo { font-size: 14px; font-weight: 700; color: var(--text); }
  .header-logo span { color: var(--blue); }
  .header-student { font-size: 13px; color: var(--text-muted); }

  /* ── LAYOUT ── */
  .container { max-width: 860px; margin: 0 auto; padding: 28px 20px; }

  /* ── WELCOME BANNER ── */
  .welcome {
    background: linear-gradient(135deg, rgba(59,130,246,0.15), rgba(99,102,241,0.1));
    border: 1px solid rgba(59,130,246,0.25);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .welcome-name { font-size: 18px; font-weight: 700; }
  .welcome-sub { color: var(--text-muted); font-size: 13px; margin-top: 4px; }

  /* ── STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: center;
  }
  .stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 700; }
  .stat-value.blue { color: var(--blue); }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.red { color: var(--red); }

  /* ── SECTION HEADERS ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title { font-size: 15px; font-weight: 700; }
  .section-count {
    background: var(--surface2);
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ── ASSIGNMENT CARDS ── */
  .assignment-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 12px;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .assignment-card:hover { border-color: var(--blue); }
  .assignment-card.blocked { border-left: 3px solid var(--amber); }
  .assignment-card.overdue { border-left: 3px solid var(--red); }
  .assignment-card.submitted { border-left: 3px solid var(--green); }
  .assignment-card.completed { border-left: 3px solid var(--green); opacity: 0.7; }

  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .card-title { font-size: 15px; font-weight: 700; flex: 1; }
  .card-class { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .card-due {
    font-size: 12px; font-weight: 600;
    padding: 3px 8px; border-radius: 999px;
    margin-left: 12px; flex-shrink: 0;
  }
  .card-due.urgent { background: rgba(239,68,68,0.15); color: var(--red); }
  .card-due.soon   { background: rgba(245,158,11,0.15); color: var(--amber); }
  .card-due.normal { background: rgba(148,163,184,0.1); color: var(--text-muted); }
  .card-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-teacher { font-size: 12px; color: var(--text-muted); }

  /* ── BADGES ── */
  .badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  .badge-assigned      { background: rgba(148,163,184,0.15); color: #94a3b8; }
  .badge-acknowledged  { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge-in_progress   { background: rgba(99,102,241,0.15); color: #818cf8; }
  .badge-blocked       { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .badge-submitted     { background: rgba(34,197,94,0.15); color: #4ade80; }
  .badge-needs_revision{ background: rgba(168,85,247,0.15); color: #c084fc; }
  .badge-completed     { background: rgba(34,197,94,0.2); color: #22c55e; }
  .badge-overdue       { background: rgba(239,68,68,0.2); color: #f87171; }
  .badge-cancelled     { background: rgba(71,85,105,0.2); color: #64748b; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    width: 90%; max-width: 600px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 20px;
  }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close {
    cursor: pointer; color: var(--text-muted);
    background: none; border: none; font-size: 22px;
  }
  .modal-close:hover { color: var(--text); }

  /* ── DETAIL SECTIONS ── */
  .detail-section { margin-bottom: 20px; }
  .detail-label {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .detail-text {
    font-size: 13px; line-height: 1.6; color: var(--text);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
  }

  /* ── FEEDBACK BOX ── */
  .feedback-item {
    background: rgba(59,130,246,0.08);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-top: 8px;
  }
  .feedback-from { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .feedback-text { font-size: 13px; line-height: 1.6; }

  /* ── TIMELINE ── */
  .timeline { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .timeline-item {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13px;
  }
  .timeline-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-top: 4px; flex-shrink: 0;
  }
  .timeline-dot.done { background: var(--green); }
  .timeline-dot.current { background: var(--blue); }
  .timeline-dot.todo { background: var(--border); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 48px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px;
    font-size: 13px; z-index: 200;
    transform: translateY(100px); opacity: 0;
    transition: all 0.2s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  .separator { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  /* Mobile */
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .welcome { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-logo">Classroom <span>Companion</span> — Student</div>
  <div style="display:flex; align-items:center; gap:16px;">
    <select id="actor-switcher" onchange="switchActor(this.value)" style="margin-bottom:0; padding:6px 12px; width:auto; font-size:13px; height:auto; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:6px; cursor:pointer;">
      <option value="">Switch Role...</option>
      <option value="teacher:manoj">MANOJ M (Teacher)</option>
      <option value="teacher:sharma">Ms. Sharma (Teacher)</option>
      <option value="coordinator:mehta">Principal Mehta (Coordinator)</option>
      <option value="student:maddy">Maddy (Student)</option>
      <option value="student:rahul">Rahul Verma (Student)</option>
      <option value="student:priya">Priya Singh (Student)</option>
    </select>
    <div class="header-student" id="header-student">Loading...</div>
  </div>
</header>

<div class="container">

  <!-- Welcome Banner -->
  <div class="welcome">
    <div>
      <div class="welcome-name" id="welcome-name">Welcome back!</div>
      <div class="welcome-sub" id="welcome-sub">Here's what's on your plate today.</div>
    </div>
    <div style="font-size:36px">📚</div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Active</div>
      <div class="stat-value blue" id="stat-active">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Submitted</div>
      <div class="stat-value green" id="stat-submitted">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Overdue</div>
      <div class="stat-value red" id="stat-overdue">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Done</div>
      <div class="stat-value green" id="stat-done">—</div>
    </div>
  </div>

  <!-- Active Assignments -->
  <div class="section-header">
    <div class="section-title">Active Assignments</div>
    <span class="section-count" id="active-count">0</span>
  </div>
  <div id="active-list">
    <div class="empty-state"><div class="empty-icon">⏳</div>Loading...</div>
  </div>

  <hr class="separator">

  <!-- Completed -->
  <div class="section-header">
    <div class="section-title">Completed</div>
    <span class="section-count" id="done-count">0</span>
  </div>
  <div id="done-list">
    <div class="empty-state"><div class="empty-icon">✅</div>Nothing completed yet.</div>
  </div>

</div>

<!-- Assignment Detail Modal -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Assignment</div>
        <div style="margin-top:6px" id="modal-badge"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <div class="detail-section">
      <div class="detail-label">Class · Teacher</div>
      <div style="font-size:13px;color:var(--text-muted)" id="modal-meta"></div>
    </div>

    <div class="detail-section">
      <div class="detail-label">Instructions</div>
      <div class="detail-text" id="modal-desc"></div>
    </div>

    <div class="detail-section" id="modal-due-section">
      <div class="detail-label">Due Date</div>
      <div style="font-size:13px" id="modal-due"></div>
    </div>

    <!-- Status Timeline -->
    <div class="detail-section">
      <div class="detail-label">Progress</div>
      <div class="timeline" id="modal-timeline"></div>
    </div>

    <!-- Submission -->
    <div class="detail-section" id="modal-submission-section" style="display:none">
      <div class="detail-label">Your Submission</div>
      <div class="detail-text" id="modal-submission-text"></div>
    </div>

    <!-- Feedback -->
    <div class="detail-section" id="modal-feedback-section" style="display:none">
      <div class="detail-label">Teacher Feedback</div>
      <div id="modal-feedback-list"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// =============================================================
// Student Dashboard JavaScript
// WHY: Students need a clean read-only view of their own work.
// This page shows ONLY the logged-in student's assignments.
// =============================================================

const API = 'http://localhost:3001/api/student';
let STUDENT_ID = localStorage.getItem('student_id') || '';

function switchActor(val) {
  if (!val) return;
  const [role, id] = val.split(':');
  if (role === 'student') {
    location.href = `../student/index.html?user=${id}`;
  } else if (role === 'coordinator') {
    location.href = `../coordinator/index.html?user=${id}`;
  } else {
    location.href = `../teacher/index.html?user=${id}`;
  }
}

window.addEventListener('load', async () => {
  const params = new URLSearchParams(location.search);
  if (params.get('user')) {
    STUDENT_ID = params.get('user');
    localStorage.setItem('student_id', STUDENT_ID);
  }

  if (!STUDENT_ID) {
    STUDENT_ID = prompt('Enter your Student ID (from seed output):') || '';
    localStorage.setItem('student_id', STUDENT_ID);
  }

  await loadDashboard();
});

async function api(path) {
  const res = await fetch(API + path, {
    headers: { 'x-user-id': STUDENT_ID }
  });
  if (res.status === 403 || res.status === 401) {
    document.body.innerHTML = `
      <div style="max-width:500px; margin:100px auto; text-align:center; padding:40px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h1 style="color:var(--red); font-size:36px; margin-bottom:20px; font-family:inherit;">⚠️ Access Denied</h1>
        <p style="color:var(--text-muted); font-size:15px; margin-bottom:24px; font-family:inherit;">Only students are authorized to access the Student Portal.</p>
        <button onclick="location.href='../teacher/index.html'" style="width:auto; background:var(--blue); color:white; font-weight:600; padding:10px 20px; border:none; border-radius:8px; cursor:pointer;">Go to Teacher Dashboard</button>
      </div>
    `;
    throw new Error('Access denied');
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || 'Request failed');
  }
  return res.json();
}

async function loadDashboard() {
  try {
    const data = await api('/dashboard');
    const { student, assignments, stats } = data;

    // Header
    document.getElementById('header-student').textContent = student.name;
    document.getElementById('welcome-name').textContent = `Hi, ${student.name}! 👋`;
    document.getElementById('welcome-sub').textContent =
      stats.overdue > 0
        ? `⚠️ You have ${stats.overdue} overdue assignment${stats.overdue > 1 ? 's' : ''}.`
        : stats.active > 0
        ? `You have ${stats.active} active assignment${stats.active > 1 ? 's' : ''}.`
        : `All caught up! Great work.`;

    // Stats
    document.getElementById('stat-active').textContent = stats.active;
    document.getElementById('stat-submitted').textContent = stats.submitted;
    document.getElementById('stat-overdue').textContent = stats.overdue;
    document.getElementById('stat-done').textContent = stats.completed;

    // Active assignments
    const active = assignments.filter(a => !['completed', 'cancelled'].includes(a.status));
    const done = assignments.filter(a => a.status === 'completed');

    document.getElementById('active-count').textContent = active.length;
    document.getElementById('done-count').textContent = done.length;

    renderAssignmentList('active-list', active, true);
    renderAssignmentList('done-list', done, false);

  } catch (err) {
    console.error(err);
    showToast('Failed to load: ' + err.message, 'error');
  }
}

// ── RENDER ASSIGNMENT LIST ────────────────────

function renderAssignmentList(containerId, assignments, isActive) {
  const el = document.getElementById(containerId);

  if (assignments.length === 0) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">${isActive ? '🎉' : '📋'}</div>
      <div>${isActive ? 'No active assignments right now.' : 'Nothing completed yet.'}</div>
    </div>`;
    return;
  }

  el.innerHTML = assignments.map(sa => {
    const dueClass = getDueClass(sa.due_at);
    const dueText = formatDue(sa.due_at);
    const hasFeedback = sa.feedback && sa.feedback.length > 0;

    return `
      <div class="assignment-card ${sa.status}" onclick="openDetail('${sa.id}')">
        <div class="card-top">
          <div>
            <div class="card-title">${sa.title}</div>
            <div class="card-class">
              ${sa.class_name} · ${sa.teacher_name}
              ${hasFeedback ? ' · <span style="color:var(--blue)">💬 Feedback received</span>' : ''}
            </div>
          </div>
          ${dueText ? `<div class="card-due ${dueClass}">${dueText}</div>` : ''}
        </div>
        <div class="card-desc">${sa.description}</div>
        <div class="card-footer">
          <span class="badge badge-${sa.status}">${formatStatus(sa.status)}</span>
          <span style="font-size:12px;color:var(--text-muted)">
            ${sa.last_student_message ? `"${sa.last_student_message}"` : ''}
          </span>
        </div>
      </div>
    `;
  }).join('');
}

// ── DETAIL MODAL ──────────────────────────────

let allAssignments = [];

async function openDetail(saId) {
  // Fetch fresh detail
  try {
    const data = await api(`/assignments/${saId}`);
    const sa = data.assignment;
    const feedback = data.feedback || [];

    document.getElementById('modal-title').textContent = sa.title;
    document.getElementById('modal-badge').innerHTML =
      `<span class="badge badge-${sa.status}">${formatStatus(sa.status)}</span>`;
    document.getElementById('modal-meta').textContent =
      `${sa.class_name} · ${sa.teacher_name}`;
    document.getElementById('modal-desc').textContent = sa.description;

    // Due date
    if (sa.due_at) {
      document.getElementById('modal-due-section').style.display = '';
      const due = new Date(sa.due_at);
      const isPast = due < new Date();
      document.getElementById('modal-due').innerHTML =
        `<span style="color:${isPast ? 'var(--red)' : 'var(--text)'}">
          ${due.toLocaleString()}${isPast ? ' (overdue)' : ''}
        </span>`;
    } else {
      document.getElementById('modal-due-section').style.display = 'none';
    }

    // Timeline
    const steps = [
      { key: 'assigned',      label: 'Assigned', icon: '📩' },
      { key: 'acknowledged',  label: 'Acknowledged', icon: '✅' },
      { key: 'in_progress',   label: 'In Progress', icon: '📝' },
      { key: 'submitted',     label: 'Submitted', icon: '📤' },
      { key: 'completed',     label: 'Completed', icon: '🎉' },
    ];
    // For blocked / needs_revision, show as a branch
    const specialStates = ['blocked', 'needs_revision', 'overdue'];
    const statusOrder = ['assigned','acknowledged','in_progress','blocked','submitted','needs_revision','completed','overdue'];
    const currentIdx = statusOrder.indexOf(sa.status);

    let timelineHtml = '';
    for (const step of steps) {
      const stepIdx = statusOrder.indexOf(step.key);
      const isDone = stepIdx < statusOrder.indexOf(sa.status) ||
                     sa.status === step.key || sa.status === 'completed';
      const isCurrent = sa.status === step.key;
      const dotClass = isDone ? 'done' : isCurrent ? 'current' : 'todo';
      timelineHtml += `
        <div class="timeline-item">
          <div class="timeline-dot ${dotClass}"></div>
          <div style="color:${isDone ? 'var(--text)' : 'var(--text-muted)'}">${step.icon} ${step.label}</div>
        </div>
      `;
    }

    // Add special state if applicable
    if (specialStates.includes(sa.status)) {
      const specialLabels = {
        blocked: '🚧 Blocked — waiting for teacher help',
        needs_revision: '🔄 Needs revision — please resubmit',
        overdue: '⏰ Overdue — please submit as soon as possible'
      };
      timelineHtml += `
        <div class="timeline-item">
          <div class="timeline-dot current" style="background:var(--amber)"></div>
          <div style="color:var(--amber)">${specialLabels[sa.status]}</div>
        </div>
      `;
    }

    document.getElementById('modal-timeline').innerHTML = timelineHtml;

    // Submission
    if (sa.submission_text || sa.submission_file_name) {
      document.getElementById('modal-submission-section').style.display = '';
      document.getElementById('modal-submission-text').textContent =
        sa.submission_text || `File: ${sa.submission_file_name}`;
    } else {
      document.getElementById('modal-submission-section').style.display = 'none';
    }

    // Feedback
    if (feedback.length > 0) {
      document.getElementById('modal-feedback-section').style.display = '';
      document.getElementById('modal-feedback-list').innerHTML = feedback.map(f => `
        <div class="feedback-item">
          <div class="feedback-from">From ${f.teacher_name} · ${new Date(f.created_at).toLocaleDateString()}</div>
          <div class="feedback-text">${f.content}</div>
        </div>
      `).join('');
    } else {
      document.getElementById('modal-feedback-section').style.display = 'none';
    }

    document.getElementById('detail-modal').classList.add('open');
  } catch (err) {
    showToast('Failed to load details: ' + err.message, 'error');
  }
}

function closeModal() {
  document.getElementById('detail-modal').classList.remove('open');
}

// Click outside to close
document.getElementById('detail-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── HELPERS ───────────────────────────────────

function formatStatus(status) {
  const map = {
    assigned: 'Assigned', acknowledged: 'Acknowledged',
    in_progress: 'In Progress', blocked: 'Blocked',
    submitted: 'Submitted', needs_revision: 'Needs Revision',
    completed: 'Completed', overdue: 'Overdue', cancelled: 'Cancelled'
  };
  return map[status] || status;
}

function getDueClass(dueAt) {
  if (!dueAt) return 'normal';
  const diff = new Date(dueAt) - new Date();
  const hours = diff / (1000 * 60 * 60);
  if (hours < 0) return 'urgent';
  if (hours < 24) return 'urgent';
  if (hours < 72) return 'soon';
  return 'normal';
}

function formatDue(dueAt) {
  if (!dueAt) return null;
  const diff = new Date(dueAt) - new Date();
  const hours = diff / (1000 * 60 * 60);
  if (hours < 0) return `Overdue`;
  if (hours < 24) return `Due in ${Math.round(hours)}h`;
  if (hours < 48) return `Due tomorrow`;
  return `Due ${new Date(dueAt).toLocaleDateString()}`;
}

function showToast(message, type = '') {
  const t = document.getElementById('toast');
  t.textContent = message;
  t.className = `toast show ${type}`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
